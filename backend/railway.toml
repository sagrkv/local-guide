[build]
builder = "nixpacks"

[deploy]
# Use db push to sync schema (no migrations folder exists)
# Seed only runs once on first deployment (uses upsert, safe to re-run)
startCommand = "npx prisma db push --skip-generate --accept-data-loss && npm run db:seed && npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[nixpacks]
providers = ["node"]

# System dependencies required for Playwright/Chromium scraping
[nixpacks.apt]
packages = ["chromium", "libnss3", "libatk-bridge2.0-0", "libdrm2", "libxcomposite1", "libxdamage1", "libxrandr2", "libgbm1", "libasound2"]
